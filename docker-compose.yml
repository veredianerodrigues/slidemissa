version: '3.8'

services:
  backend:
    build: ./backend
    container_name: slidemissa-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/banco:/app/banco
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: slidemissa-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  banco:
